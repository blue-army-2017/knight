# https://taskfile.dev
---
version: "3"

tasks:
  run:
    cmds:
      - go run .
    silent: true

  format:
    cmds:
      - go fmt ./...
  lint:
    cmds:
      - go vet ./...
  test:
    cmds:
      - go test ./...

  build:
    cmds:
      - go build .
    deps:
      - download-assets
  download-assets:
    cmds:
      - wget "https://raw.githubusercontent.com/picocss/pico/v2.0.3/css/pico.blue.min.css" -O assets/css/pico.css
