---
name: Build

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Bun
        uses: oven-sh/setup-bun@v1
      - name: Cache Node Modules
        id: cache-node
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runners.os }}-node-${{ hashFiles('bun.lockb') }}
      - name: Install
        run: bun install --frozen-lockfile
      - name: Check
        run: bun run check
      - name: Lint
        run: bun run lint

  build:
    runs-on: ubuntu-latest
    needs:
      - test
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Bun
        uses: oven-sh/setup-bun@v1
      - name: Cache Node Modules
        id: cache-node
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runners.os }}-node-${{ hashFiles('bun.lockb') }}
      - name: Install
        run: bun install --frozen-lockfile
      - name: Build
        run: bun run build
      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build/
